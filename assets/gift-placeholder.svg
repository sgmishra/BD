<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Gift Placeholder</title>
  <desc id="desc">Placeholder image for a future gift.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#5f2134" />
      <stop offset="100%" stop-color="#17070f" />
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,236,204,0.22)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)" />
    </linearGradient>
  </defs>
  <rect width="900" height="900" fill="url(#bg)" />
  <circle cx="180" cy="170" r="120" fill="rgba(255,214,123,0.14)" />
  <circle cx="720" cy="210" r="90" fill="rgba(255,182,201,0.14)" />
  <circle cx="760" cy="760" r="160" fill="rgba(255,228,181,0.1)" />
  <rect x="120" y="170" width="660" height="560" rx="44" fill="url(#card)" stroke="rgba(255,255,255,0.16)" />
  <rect x="390" y="220" width="120" height="460" rx="28" fill="rgba(255,228,181,0.72)" />
  <rect x="220" y="390" width="460" height="120" rx="28" fill="rgba(255,228,181,0.72)" />
  <circle cx="450" cy="450" r="72" fill="rgba(255,255,255,0.24)" />
  <text x="450" y="780" text-anchor="middle" fill="#ffe8b4" font-family="Georgia, serif" font-size="54">Future Gift</text>
</svg>
